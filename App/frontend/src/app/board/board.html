<header class="page-header">
  <h1>Board</h1>
  <button mat-fab class="new-task-fab" aria-label="Nuova Attività" (click)="openCreateDialog()">
    <mat-icon>add</mat-icon>
  </button>
</header>

<div class="board-columns" cdkDropListGroup>
  @for (column of columns; track column.status) {
    <section class="board-column" [attr.aria-label]="column.label">
      <h2 class="column-header">{{ column.label }}</h2>

      <!--
        ADR-0002: no intra-column reorder — cdkDropListGroup connects every column's list, but
        onDrop() no-ops when previousContainer === container, so a drop back into the same
        column never changes anything.
      -->
      <div
        class="column-drop-list"
        cdkDropList
        (cdkDropListDropped)="onDrop($event, column.status)"
      >
        @if (tasksFor(column.status).length === 0) {
          <p class="empty-state">Nessuna Attività qui.</p>
        } @else {
          @for (task of tasksFor(column.status); track task.id) {
            <div
              class="task-card-drag"
              cdkDrag
              [cdkDragData]="task"
              (cdkDragStarted)="onDragStarted()"
              (cdkDragEnded)="onDragEnded()"
            >
              <app-task-card
                [task]="task"
                (editRequested)="openEditDialog(task)"
                (deleteRequested)="confirmDelete(task)"
                (detailsRequested)="openDetailDialog(task)"
              />
            </div>
          }
        }
      </div>

      @if (column.status === 'Done' && hasMoreDone()) {
        <button mat-button class="show-more" (click)="showMoreDone()">Mostra altre</button>
      }
    </section>
  }
</div>
